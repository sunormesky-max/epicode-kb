services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: epicode
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: epicode_kb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epicode -d epicode_kb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      EPICODE_KB_LISTEN_ADDR: 0.0.0.0:3000
      EPICODE_KB_DATABASE_URL: postgres://epicode:${POSTGRES_PASSWORD:-changeme}@postgres/epicode_kb
      EPICODE_KB_TANTIVY_PATH: /app/data/tantivy
      EPICODE_KB_UPLOAD_DIR: /app/data/uploads
      EPICODE_KB_JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      EPICODE_KB_JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      RUST_LOG: epicode_kb=info
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:
