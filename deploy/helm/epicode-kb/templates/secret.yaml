apiVersion: v1
kind: Secret
metadata:
  name: {{ include "epicode-kb.name" . }}-secret
  labels:
    {{- include "epicode-kb.labels" . | nindent 4 }}
type: Opaque
stringData:
  EPICODE_KB_JWT_ACCESS_SECRET: {{ .Values.config.jwtAccessSecret | quote }}
  EPICODE_KB_JWT_REFRESH_SECRET: {{ .Values.config.jwtRefreshSecret | quote }}
  EPICODE_KB_API_KEY_SALT: {{ .Values.config.apiKeySalt | quote }}
  EPICODE_KB_DATABASE_URL: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "epicode-kb.name" . }}-postgresql/{{ .Values.postgresql.auth.database }}"
