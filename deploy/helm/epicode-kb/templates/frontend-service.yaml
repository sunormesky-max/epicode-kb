apiVersion: v1
kind: Service
metadata:
  name: {{ include "epicode-kb.name" . }}-frontend
  labels:
    {{- include "epicode-kb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
  selector:
    {{- include "epicode-kb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
